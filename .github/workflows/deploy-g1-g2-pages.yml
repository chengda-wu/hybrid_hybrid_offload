name: Deploy g1/g2 checkpoint Pareto page

on:
  push:
    branches:
      - experiment
    paths:
      - docs/dsv4_kv_cache/segmented_checkpoint_gap/dsv4_checkpoint_g1_g2_pareto_interactive.html
      - .github/workflows/deploy-g1-g2-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/dsv4_kv_cache/segmented_checkpoint_gap/dsv4_checkpoint_g1_g2_pareto_interactive.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
